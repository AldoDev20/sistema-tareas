name: Prueba de Alerta a Discord

on:
  push:
    branches:
      - main

jobs:
  enviar-alerta:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensaje de prueba a Discord
        uses: sinzyo/discord-webhook-action@v1
        with:
          url: ${{ secrets.DISCORD_WEBHOOK }}
          description: "🚀 ¡CI/CD Funcionando con Éxito desde GitHub Actions! Computadora virtual encendida por ${{ github.actor }}."
