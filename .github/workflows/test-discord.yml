name: Prueba de Alerta a Discord

on:
  push:
    branches:
      - main

jobs:
  enviar-alerta:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensaje directo por comando curl
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"username": "Fábrica CI/CD", "content": "🚀 ¡CI/CD Funcionando al 100%! Alerta directa enviada desde los servidores de GitHub."}' \
               "${{ secrets.DISCORD_WEBHOOK }}"
