name: Control de Tareas con Bot de Discord

on:
  push:
    paths:
      - 'tareas/**'

jobs:
  notificar-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Este paso identifica qué archivo de la carpeta tareas se acaba de subir
      - name: Detectar archivo de tarea nuevo
        id: detectar
        run: |
          ARCHIVO_NUEVO=$(git diff --name-only HEAD~1 HEAD | grep '^tareas/' | head -n 1)
          echo "archivo=$ARCHIVO_NUEVO" >> $GITHUB_OUTPUT

      # Envía el archivo completo leído de forma automática a Discord
      - name: Enviar archivo de tarea a Discord
        uses: appleboy/discord-action@master
        with:
          webhook_id: "1524569126427693178"
          webhook_token: "kxIS1c9SkYMaQrMxDHgJtMnNP7Wd3yLhoeSjradriPoQbIWbUi7VviAopXfhiZzT3KSz"
          file: "${{ steps.detectar.outputs.archivo }}"
